[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:sshd]
command=/usr/sbin/sshd -D
autorestart=true
stdout_logfile=/var/log/supervisor/sshd.log
stderr_logfile=/var/log/supervisor/sshd.err

[program:jupyter]
command=jupyter lab \
  --ip=0.0.0.0 \
  --port=5866 \
  --allow-root \
  --no-browser \
  --NotebookApp.password=$(python3 -c "from jupyter_server.auth import passwd; print(passwd('%(ENV_JUPYTER_PASSWORD)s'))") \
  --notebook-dir=/mnt/d \
  --ServerApp.allow_origin='*' \
  --ServerApp.disable_check_xsrf=true
autorestart=true
stdout_logfile=/var/log/supervisor/jupyter.log
stderr_logfile=/var/log/supervisor/jupyter.err
priority=100

[program:code-server]
command=code-server \
  --bind-addr 0.0.0.0:8080 \
  --auth password \
  --password %(ENV_JUPYTER_PASSWORD)s \
  /mnt/d
autorestart=true
stdout_logfile=/var/log/supervisor/code-server.log
stderr_logfile=/var/log/supervisor/code-server.err
